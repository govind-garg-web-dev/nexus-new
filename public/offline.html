<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NullSpace — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #06060e; color: #e8e8f0;
      font-family: system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.75rem; }
    p  { font-size: 0.9rem; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff; border: none; border-radius: 12px;
      padding: 0.875rem 2rem; font-size: 0.9rem; font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div>
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>NullSpace needs a connection to load.<br/>Check your internet and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
